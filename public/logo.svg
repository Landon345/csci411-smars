<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="120" height="80">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7f5af0"/>
      <stop offset="100%" stop-color="#2cb67d"/>
    </linearGradient>
  </defs>
  <!-- Parallelogram background -->
  <polygon points="15,0 120,0 105,80 0,80" fill="url(#grad)"/>
  <!-- Cool S: scaled to fit logo height, centered at (60,40) -->
  <!-- Original S spans x=20-80, y=10-190 in a 100x200 space; center=(50,100) -->
  <g transform="translate(60,40) scale(0.36) translate(-50,-100)"
     stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 20 40 L 50 10 L 80 40" />
    <line x1="20" y1="40" x2="20" y2="80" />
    <line x1="50" y1="40" x2="50" y2="80" />
    <line x1="80" y1="40" x2="80" y2="80" />
    <path d="M 20 80 L 50 120" />
    <path d="M 50 80 L 80 120" />
    <line x1="20" y1="120" x2="20" y2="160" />
    <line x1="50" y1="120" x2="50" y2="160" />
    <line x1="80" y1="120" x2="80" y2="160" />
    <path d="M 20 160 L 50 190 L 80 160" />
  </g>
</svg>
